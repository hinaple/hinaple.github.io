<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>숫자 MBTI 변환기</title>
        <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    </head>
    <body>
        <h1>숫자 MBTI 변환기</h1>
        <br><br><br>
        <input type="text" id="mbti" placeholder="MBTI">
        <br><br>▼<br><br>
        <input type="text" id="number" placeholder="숫자" style="text-align: center;" disabled>

        <script>
            const MBTIS = [
                [ 'E', 'I'],
                [ 'S', 'N' ],
                [ 'T', 'F' ],
                [ 'J', 'P' ]
            ];

            const mbti = document.getElementById("mbti");
            const number = document.getElementById("number");

            function mbti2number(str) {
                if(str.length != 4) return false;

                str = str.toUpperCase();

                let arr = new Array(4);
                for(let i = 0; i < 4; i++) {
                    arr[i] = MBTIS[i].indexOf(str[i]);
                    if(arr[i] === -1) return false;
                }

                return Number(parseInt(Number(arr.join('')), 2).toString(10));
            }

            mbti.addEventListener("input" ,() => {
                dec = mbti2number(mbti.value);
                if(dec === false) dec = null;
                number.value = dec;
            });
        </script>

        <style>
            h1 {
                margin-top: 100px;
                font-size: 50px;
            }
            body {
                text-align: center;
                font-size: 40px;
                font-family: 'Jua', sans-serif;
            }
            input {
                font-size: 40px;
                font-family: 'Jua', sans-serif;
                border-radius: 20px;
                border: solid 5px #000;
                width: 250px;
            }
            button {
                background-color: #fff;
                margin-top: 100px;
                font-size: 40px;
                font-family: 'Jua', sans-serif;
                border-radius: 20px;
                border: solid 5px #000;
                width: 200px; 
            }
        </style>
    </body>
</html>
